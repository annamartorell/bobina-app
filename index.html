<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobina — colección de cámaras</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#150c0e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bobina">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#150c0e;
    --ink-2:#211316;
    --paper:#f3e7e6;
    --paper-dim:#e2cfce;
    --brass:#a83b52;
    --brass-dim:#6e2836;
    --shutter:#b8425a;
    --shutter-dim:#82293a;
    --reel:#7a5459;
    --text-on-ink:#f0dcdd;
    --text-on-ink-dim:#a2818a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);font-family:'Roboto',sans-serif;color-scheme:dark;}
  .phone{
    max-width:420px;margin:0 auto;background:var(--ink);
    min-height:100vh;position:relative;padding-bottom:100px;
  }
  .topbar{
    padding:24px 20px 14px;position:sticky;top:0;background:var(--ink);z-index:10;
    border-bottom:1px solid #2c151a;
  }
  .brandrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .brandrow h1{
    font-family:'Roboto',sans-serif;font-weight:700;font-size:26px;color:var(--paper);margin:0;
    letter-spacing:0.5px;
  }
  .counter{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--brass);letter-spacing:1px;}
  .tagline{font-size:12px;color:var(--text-on-ink-dim);margin:0 0 16px;}
  .searchwrap{position:relative;margin-bottom:12px;}
  .search{
    width:100%;height:38px;border-radius:19px;border:1px solid #3a1e24;background:var(--ink-2);
    color:var(--paper);padding:0 34px 0 16px;font-family:'Roboto';font-size:13px;outline:none;
  }
  .search::placeholder{color:var(--text-on-ink-dim);}
  .clearsearch{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;
    border-radius:50%;border:none;background:var(--ink-2);color:var(--text-on-ink-dim);
    font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .dial{
    display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;
    padding-bottom:2px;scrollbar-width:none;margin:0 -20px;padding-left:20px;padding-right:20px;
  }
  .dial::-webkit-scrollbar{display:none;}
  .dial button{
    flex:0 0 auto;white-space:nowrap;font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:0.5px;
    text-transform:uppercase;color:var(--text-on-ink-dim);background:transparent;
    border:1px solid #3a1e24;border-radius:14px;padding:6px 12px;cursor:pointer;
  }
  .dial button.active{background:var(--brass);border-color:var(--brass);color:var(--ink);}

  .tabrow{
    display:flex;gap:20px;margin:12px -20px 0;padding:0 20px;
  }
  .tabrow button{
    border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;
    padding:9px 0 9px;font-family:'Roboto Mono',monospace;font-size:11.5px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--text-on-ink-dim);cursor:pointer;
  }
  .tabrow button.active{color:var(--paper);border-bottom-color:var(--shutter);font-weight:700;}

  .content{padding:16px 16px 0;}
  .empty{
    text-align:center;padding:60px 24px;color:var(--text-on-ink-dim);
  }
  .empty i{font-size:34px;color:var(--brass-dim);display:block;margin-bottom:14px;}
  .reel-icon{display:block;margin:0 auto 14px;}
  .empty h3{font-family:'Roboto',sans-serif;color:var(--paper);font-weight:500;font-size:17px;margin:0 0 6px;}
  .empty p{font-size:13px;margin:0 0 18px;line-height:1.5;}
  .empty button{
    font-family:'Roboto Mono',monospace;font-size:12px;background:var(--brass);color:var(--ink);
    border:none;border-radius:6px;padding:10px 18px;cursor:pointer;
  }

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch;}
  .card{
    background:#ffffff;border:1px solid #3a1e24;border-radius:4px;position:relative;overflow:hidden;
    cursor:pointer;transition:transform .15s ease;display:flex;flex-direction:column;height:100%;
  }
  .card:active{transform:scale(0.97);}
  .sprockets{display:flex;justify-content:space-between;padding:4px 6px;background:#000;gap:2px;}
  .sprockets span{flex:1;height:5px;border-radius:1px;background:#3a3a3a;}
  .thumb{
    height:76px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ink);
    flex:none;
  }
  .cardbody{padding:8px 10px 10px;border-top:1px solid #ece3e3;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
  .eyebrow{
    font-family:'Roboto Mono',monospace;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;
    color:var(--brass-dim);margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .model{
    font-family:'Roboto',sans-serif;font-weight:500;font-size:14.5px;color:var(--ink);margin:0 0 4px;
    line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .specrow{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
  .spec{font-family:'Roboto Mono',monospace;font-size:10px;color:#8a6b6f;white-space:nowrap;}
  .badge{
    font-family:'Roboto Mono',monospace;font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;
    padding:2px 6px;border-radius:8px;
  }
  .badge.owned{background:#3a141c;color:#e59aa8;}
  .badge.wish{background:#241318;color:#a4838a;}

  .fab{
    position:fixed;right:22px;bottom:26px;z-index:20;
  }
  .fab button{
    width:56px;height:56px;border-radius:50%;background:var(--shutter);
    border:3px solid #a8425233;color:var(--paper);font-size:22px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.4);
  }
  .fab button:active{transform:scale(.94);}

  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;
    justify-content:center;z-index:60;padding:24px;
  }
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:6px;}
  .sheet{
    width:100%;max-width:420px;background:var(--ink-2);border-radius:18px 18px 0 0;
    padding:20px 20px 26px;max-height:86vh;overflow-y:auto;
  }
  .sheet h2{font-family:'Roboto',sans-serif;color:var(--paper);font-weight:500;font-size:18px;margin:0 0 16px;}
  .field{margin-bottom:12px;}
  .field label{
    display:block;font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--text-on-ink-dim);margin-bottom:5px;
  }
  .field input, .field select, .field textarea{
    width:100%;background:var(--ink);border:1px solid #3a1e24;border-radius:8px;color:var(--paper);
    padding:9px 12px;font-family:'Roboto';font-size:13.5px;outline:none;
  }
  .field textarea{resize:vertical;min-height:56px;}
  .field select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%237c8ba5'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:28px;}
  .photopick{
    height:110px;border:1px dashed #a83b52;border-radius:10px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;overflow:hidden;background:var(--ink);
  }
  .photopick span{font-size:12px;color:var(--text-on-ink-dim);font-family:'Roboto Mono',monospace;}
  .photopick img{width:100%;height:100%;object-fit:cover;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .stars{display:flex;gap:6px;margin-top:2px;}
  .stars span{font-size:20px;color:#3a2228;cursor:pointer;}
  .stars span.on{color:var(--brass);}
  .segrow{display:flex;gap:8px;margin-top:2px;}
  .segrow button{
    flex:1;font-family:'Roboto Mono',monospace;font-size:11px;padding:9px 6px;border-radius:8px;
    border:1px solid #3a1e24;background:transparent;color:var(--text-on-ink-dim);cursor:pointer;
  }
  .segrow button.on{background:var(--brass);border-color:var(--brass);color:var(--ink);}
  .sheetactions{display:flex;gap:10px;margin-top:18px;}
  .btn{
    flex:1;font-family:'Roboto Mono',monospace;font-size:12px;padding:11px;border-radius:8px;
    border:1px solid #3a1e24;background:transparent;color:var(--paper);cursor:pointer;
  }
  .btn.primary{background:var(--brass);border-color:var(--brass);color:var(--ink);}
  .btn.danger{color:var(--shutter);border-color:var(--shutter-dim);}
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <div class="brandrow">
      <h1>Bobina</h1>
      <span class="counter" id="counter">000/000</span>
    </div>
    <p class="tagline">tu colección de cámaras, cuadro a cuadro</p>
    <div class="searchwrap">
      <input class="search" id="search" placeholder="Buscar por marca o modelo…">
      <button id="clearSearch" class="clearsearch" style="display:none;" aria-label="Borrar búsqueda">✕</button>
    </div>
    <div class="dial" id="dial"></div>
    <div class="tabrow" id="statusDial"></div>
  </div>
  <div class="content">
    <div id="empty" class="empty" style="display:none;">
      <svg class="reel-icon" viewBox="0 0 64 64" width="44" height="44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="26" stroke="var(--brass-dim)" stroke-width="3"/>
        <circle cx="32" cy="32" r="7" stroke="var(--brass-dim)" stroke-width="3"/>
        <circle cx="32" cy="14" r="4.5" stroke="var(--brass-dim)" stroke-width="3"/>
        <circle cx="17" cy="41" r="4.5" stroke="var(--brass-dim)" stroke-width="3"/>
        <circle cx="47" cy="41" r="4.5" stroke="var(--brass-dim)" stroke-width="3"/>
      </svg>
      <h3>Aún no hay cámaras</h3>
      <p>Empieza a llenar tu bobina.<br>Añade la primera cámara de tu colección.</p>
      <button onclick="openSheet()">Añadir cámara</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="fab"><button onclick="openSheet()" aria-label="Añadir cámara">+</button></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">Nueva cámara</h2>
    <div class="field">
      <label>Foto</label>
      <div class="photopick" id="photopick" onclick="document.getElementById('f_photo').click()">
        <span id="photoLabel">Toca para añadir una foto</span>
        <img id="photoPreview" style="display:none;">
      </div>
      <input type="file" id="f_photo" accept="image/*" style="display:none;">
    </div>
    <div class="row2">
      <div class="field">
        <label>Marca</label>
        <select id="f_brand_select" onchange="onBrandSelect()"></select>
        <input id="f_brand_custom" placeholder="Escribe la marca" style="display:none;margin-top:6px;">
      </div>
      <div class="field"><label>Modelo</label><input id="f_model" placeholder="AE-1, M6, SX-70…"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Año</label><input id="f_year" placeholder="1978" inputmode="numeric"></div>
      <div class="field"><label>Formato</label>
        <select id="f_format">
          <option value="35mm">35mm</option>
          <option value="Instantánea">Instantánea</option>
          <option value="Digital">Digital</option>
          <option value="Video">Video</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Añadir a:</label>
      <div class="segrow" id="statusRow">
        <button data-v="poseída" class="on" type="button">Mi colección</button>
        <button data-v="deseada" type="button">Favoritos</button>
      </div>
    </div>
    <div class="field">
      <label>Condición</label>
      <div class="stars" id="stars">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <div class="field"><label>Notas</label><textarea id="f_notes" placeholder="Nº de serie, procedencia, estado del fuelle…"></textarea></div>
    <div class="sheetactions">
      <button class="btn" onclick="closeSheet()">Cancelar</button>
      <button class="btn danger" id="deleteBtn" style="display:none;" onclick="deleteCamera()">Eliminar</button>
      <button class="btn primary" onclick="saveCamera()">Guardar</button>
    </div>
  </div>
</div>

<script>
let cameras = [];
let filterFormat = 'Todas';
let filterStatus = 'poseída';
let editingId = null;
let rating = 0;

const FORMATS = ['Todas','35mm','Instantánea','Digital','Video','Otro'];
const STATUS_OPTIONS = [
  {label:'Mi colección', value:'poseída'},
  {label:'Favoritos', value:'deseada'},
  {label:'Todas', value:'Todas'}
];
const THUMB_ICON = `<svg viewBox="0 0 64 64" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="26" stroke="#6e2836" stroke-width="3"/>
  <circle cx="32" cy="32" r="7" stroke="#6e2836" stroke-width="3"/>
  <circle cx="32" cy="14" r="4.5" stroke="#6e2836" stroke-width="3"/>
  <circle cx="17" cy="41" r="4.5" stroke="#6e2836" stroke-width="3"/>
  <circle cx="47" cy="41" r="4.5" stroke="#6e2836" stroke-width="3"/>
</svg>`;
const CURATED_BRANDS = ['Canon','Nikon','Leica','Polaroid','Fujifilm','Olympus','Pentax','Minolta','Kodak','Hasselblad','Rolleiflex','Contax','Yashica','Zeiss Ikon','Sony','Agfa','Voigtländer','Mamiya'];
let currentPhoto = null;

function allBrands(){
  const used = cameras.map(c=>c.brand).filter(Boolean);
  return [...new Set([...CURATED_BRANDS, ...used])].sort((a,b)=>a.localeCompare(b,'es'));
}

function populateBrandSelect(selected){
  const sel = document.getElementById('f_brand_select');
  sel.innerHTML = '';
  allBrands().forEach(b=>{
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  });
  const otherOpt = document.createElement('option');
  otherOpt.value = '__other__'; otherOpt.textContent = 'Otra marca (escribir)';
  sel.appendChild(otherOpt);

  const custom = document.getElementById('f_brand_custom');
  if(selected && !allBrands().includes(selected)){
    sel.value = '__other__';
    custom.style.display='block';
    custom.value = selected;
  } else {
    sel.value = selected || allBrands()[0];
    custom.style.display='none';
    custom.value = '';
  }
}

function onBrandSelect(){
  const sel = document.getElementById('f_brand_select');
  const custom = document.getElementById('f_brand_custom');
  if(sel.value==='__other__'){
    custom.style.display='block';
    custom.focus();
  } else {
    custom.style.display='none';
    custom.value='';
  }
}

function currentBrandValue(){
  const sel = document.getElementById('f_brand_select');
  const custom = document.getElementById('f_brand_custom');
  return sel.value==='__other__' ? custom.value.trim() : sel.value;
}

function resetPhoto(){
  currentPhoto = null;
  document.getElementById('photoLabel').style.display='block';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('f_photo').value = '';
}

document.getElementById('f_photo').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 480;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      currentPhoto = canvas.toDataURL('image/jpeg', 0.72);
      const preview = document.getElementById('photoPreview');
      preview.src = currentPhoto;
      preview.style.display='block';
      document.getElementById('photoLabel').style.display='none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function load(){
  try{
    const raw = localStorage.getItem('cameras-v1');
    cameras = raw ? JSON.parse(raw) : [];
  }catch(e){ cameras = []; }
  renderDial();
  renderStatusDial();
  render();
}

function persist(){
  try{ localStorage.setItem('cameras-v1', JSON.stringify(cameras)); }
  catch(e){ console.error('storage error', e); }
}

function renderDial(){
  const dial = document.getElementById('dial');
  dial.innerHTML = '';
  FORMATS.forEach(f=>{
    const b = document.createElement('button');
    b.textContent = f;
    if(f===filterFormat) b.classList.add('active');
    b.onclick = ()=>{ filterFormat = f; renderDial(); render(); };
    dial.appendChild(b);
  });
}

function renderStatusDial(){
  const dial = document.getElementById('statusDial');
  dial.innerHTML = '';
  STATUS_OPTIONS.forEach(opt=>{
    const b = document.createElement('button');
    b.textContent = opt.label;
    if(opt.value===filterStatus) b.classList.add('active');
    b.onclick = ()=>{ filterStatus = opt.value; renderStatusDial(); render(); };
    dial.appendChild(b);
  });
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = cameras.filter(c=>{
    const matchFmt = filterFormat==='Todas' || c.format===filterFormat;
    const matchStatus = filterStatus==='Todas' || c.status===filterStatus;
    const matchQ = !q || (c.brand+' '+c.model).toLowerCase().includes(q);
    return matchFmt && matchStatus && matchQ;
  });
  document.getElementById('counter').textContent =
    String(list.length).padStart(3,'0')+'/'+String(cameras.length).padStart(3,'0');

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if(cameras.length===0){ empty.style.display='block'; grid.style.display='none'; return; }
  empty.style.display='none'; grid.style.display='grid';

  list.forEach(c=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <div class="sprockets">${'<span></span>'.repeat(14)}</div>
      <div class="thumb" ${c.photo?`style="padding:0;"`:''}>${c.photo?`<img src="${c.photo}" style="width:100%;height:100%;object-fit:cover;">`:THUMB_ICON}</div>
      <div class="cardbody">
        <div>
          <p class="eyebrow">${escapeHtml(c.brand||'—')}</p>
          <p class="model">${escapeHtml(c.model||'sin modelo')}</p>
        </div>
        <div class="specrow">
          <span class="spec">${c.year||'s/f'} · ${c.format}</span>
          <span class="spec">${'★'.repeat(c.rating||0)}${'☆'.repeat(5-(c.rating||0))}</span>
        </div>
      </div>
      <div class="sprockets">${'<span></span>'.repeat(14)}</div>
    `;
    card.querySelector('.thumb').addEventListener('click', e=>{
      e.stopPropagation();
      if(c.photo) openLightbox(c.photo); else openSheet(c.id);
    });
    card.querySelector('.cardbody').addEventListener('click', e=>{
      e.stopPropagation();
      openSheet(c.id);
    });
    grid.appendChild(card);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function openSheet(id){
  editingId = id || null;
  const cam = id ? cameras.find(c=>c.id===id) : null;
  document.getElementById('sheetTitle').textContent = cam ? 'Editar cámara' : 'Nueva cámara';
  populateBrandSelect(cam ? cam.brand : null);
  resetPhoto();
  if(cam && cam.photo){
    currentPhoto = cam.photo;
    const preview = document.getElementById('photoPreview');
    preview.src = cam.photo;
    preview.style.display='block';
    document.getElementById('photoLabel').style.display='none';
  }
  document.getElementById('f_model').value = cam ? cam.model : '';
  document.getElementById('f_year').value = cam ? cam.year : '';
  document.getElementById('f_format').value = cam ? cam.format : '35mm';
  document.getElementById('f_notes').value = cam ? cam.notes : '';
  rating = cam ? (cam.rating||0) : 0;
  updateStars();
  document.querySelectorAll('#statusRow button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v === (cam ? cam.status : 'poseída'));
  });
  document.getElementById('deleteBtn').style.display = cam ? 'block' : 'none';
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }

document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target.id==='overlay') closeSheet();
});
document.getElementById('statusRow').addEventListener('click', e=>{
  if(e.target.tagName==='BUTTON'){
    document.querySelectorAll('#statusRow button').forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on');
  }
});
document.getElementById('stars').addEventListener('click', e=>{
  if(e.target.dataset.v){ rating = parseInt(e.target.dataset.v); updateStars(); }
});
function updateStars(){
  document.querySelectorAll('#stars span').forEach(s=>{
    s.classList.toggle('on', parseInt(s.dataset.v) <= rating);
  });
}
document.getElementById('search').addEventListener('input', e=>{
  document.getElementById('clearSearch').style.display = e.target.value ? 'flex' : 'none';
  render();
});
document.getElementById('clearSearch').addEventListener('click', ()=>{
  const input = document.getElementById('search');
  input.value = '';
  document.getElementById('clearSearch').style.display = 'none';
  render();
  input.focus();
});

async function saveCamera(){
  const brand = currentBrandValue();
  const model = document.getElementById('f_model').value.trim();
  if(!brand && !model){ closeSheet(); return; }
  const status = document.querySelector('#statusRow button.on').dataset.v;
  const data = {
    id: editingId || (Date.now()+''+Math.floor(Math.random()*1000)),
    brand, model,
    year: document.getElementById('f_year').value.trim(),
    format: document.getElementById('f_format').value,
    status, rating,
    photo: currentPhoto,
    notes: document.getElementById('f_notes').value.trim()
  };
  if(editingId){
    cameras = cameras.map(c=>c.id===editingId ? data : c);
  } else {
    cameras.push(data);
  }
  await persist();
  closeSheet();
  render();
}

async function deleteCamera(){
  const cam = cameras.find(c=>c.id===editingId);
  const titulo = cam ? [cam.brand, cam.model].filter(Boolean).join(' ') || 'esta cámara' : 'esta cámara';
  if(!confirm(`¿Seguro que quieres eliminar "${titulo}"?`)) return;
  cameras = cameras.filter(c=>c.id!==editingId);
  await persist();
  closeSheet();
  render();
}

load();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
